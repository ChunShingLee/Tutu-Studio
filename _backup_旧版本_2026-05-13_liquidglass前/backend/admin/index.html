<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>兔兔视觉后台入口</title>
  <style>
    :root {
      --orange: #ff6b35;
      --purple: #6c5ce7;
      --bg: #f8f9fa;
      --dark: #2d3436;
      --muted: #636e72;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--dark);
      background:
        radial-gradient(circle at top right, rgba(108, 92, 231, 0.12), transparent 28%),
        radial-gradient(circle at top left, rgba(255, 107, 53, 0.14), transparent 24%),
        var(--bg);
    }

    .card {
      width: min(720px, 100%);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 20px 44px rgba(45, 52, 54, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.65;
      color: var(--muted);
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, var(--orange), var(--purple));
      font-weight: 700;
      margin-top: 8px;
    }

    code {
      padding: 2px 6px;
      border-radius: 8px;
      background: #f2f4f7;
      color: var(--dark);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>兔兔视觉后台已切换到 AdminJS</h1>
    <p>这个本地 HTML 不再承担后台 UI，本次改造后的真实后台入口是运行中的服务地址 <code id="targetText"></code>。</p>
    <p>如果页面没有自动跳转，请先在 <code>backend</code> 目录启动后端，再点击下面的按钮进入。</p>
    <p>默认开发账号仍然是 <code>admin@tutu.local</code> / <code>TutuAdmin123!</code>，运营账号是 <code>operator@tutu.local</code> / <code>TutuOperator123!</code>。</p>
    <a id="targetLink" href="http://127.0.0.1:3000/admin">打开真实后台</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const apiBase = (params.get('apiBase') || 'http://127.0.0.1:3000').replace(/\/$/, '');
    const target = `${apiBase}/admin`;
    document.getElementById('targetText').textContent = target;
    document.getElementById('targetLink').href = target;
    setTimeout(() => {
      window.location.href = target;
    }, 400);
  </script>
</body>
</html>
