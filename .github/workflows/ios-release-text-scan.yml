name: iOS Release Text Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  release-text-scan:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan Swift release copy
        run: bash scripts/scan_release_text.sh ios/TuTuVisionApp/TuTuVisionApp
